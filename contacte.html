    <main class="main-contacte">
        <div class="contact-wrapper">
            <h2 class="titol-seccio"><span class="text-vermell">05.</span> Contacta'm</h2>
            <p class="subtitol">Tens alguna pregunta o vols contactar amb mi? Emplena el formulari i et respondré tan aviat com pugui.</p>
            
            <form class="contact-form" method="POST">
                <div class="form-group">
                    <label for="nom">Nom</label>
                    <input type="text" id="nom" name="nom" required>
                </div>
                <div class="form-group">
                    <label for="correu">Correu electrònic</label>
                    <input type="email" id="correu" name="correu" required>
                </div>
                <div class="form-group">
                    <label for="missatge">Missatge</label>
                    <textarea id="missatge" name="missatge" rows="5" required></textarea>
                </div>
                <button type="submit" class="boto-cv">Enviar Missatge</button>
            </form>
        </div>
    </main>
